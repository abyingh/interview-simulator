<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Interview Simulator App - Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <span class="navbar-brand"> Interview Simulator</span>
        <span class="text-light">
            <i class="bi bi-person-circle"></i> {{ request.user.username }}
            &nbsp;|&nbsp;
            <a href="{% url 'logout' %}" class="text-light text-decoration-none">Logout</a>
        </span>
    </div>
</nav>

<div class="container" style="max-width:800px">

    <!-- Setup -->
    <div id="setup-section" class="card shadow-sm mb-4">
        <div class="card-body">
            <h5 class="card-title">New Interview Session</h5>
            <div class="mb-3">
                <label class="form-label">Describe the company</label>
                <textarea id="company-desc" class="form-control" rows="3"
                    placeholder="e.g. A mid-size technology consulting firm with 500 employees specializing in cloud migration and data analytics."></textarea>
            </div>
            <button id="start-btn" class="btn btn-primary" onclick="InterviewApp.startInterviews()">
                <i class="bi bi-play-fill"></i> Start Interviews
            </button>
        </div>
    </div>

    <!-- Progress section--> 
    <div id="progress-section" class="card shadow-sm mb-4" style="display:none">
        <div class="card-body">
            <h5 class="card-title">Interview Progress</h5>
            <div class="progress mb-2" style="height:28px">
                <div id="progress-bar"
                     class="progress-bar progress-bar-striped progress-bar-animated"
                     style="width:0%">0 %</div>
            </div>
            <p id="progress-text" class="text-muted mb-0">Starting…</p>
            <!-- Role badges appear once the backend generates employee roles -->
            <div id="roles-section" class="mt-3" style="display:none">
                <h6><i class="bi bi-people-fill"></i> Employees Being Interviewed</h6>
                <div id="roles-list" class="d-flex flex-wrap gap-1"></div>
            </div>
        </div>
    </div>

    <!-- Results -->
    <div id="results-section" class="card shadow-sm mb-4" style="display:none">
        <div class="card-body">
            <h5 class="card-title">Top 3 Strategic Recommendations</h5>
            <div id="themes-container"></div>
            <div class="mt-3">
                <a id="deck-btn" class="btn btn-success" href="#" download>
                    <i class="bi bi-file-earmark-ppt-fill"></i> Download Board Deck (PPTX)
                </a>
                <button class="btn btn-outline-secondary ms-2" onclick="InterviewApp.resetUI()">
                    <i class="bi bi-plus-circle"></i> New Session
                </button>
            </div>
        </div>
    </div>

    <!-- Conversations -->
    <div id="conversations-section" class="card shadow-sm mb-4" style="display:none">
        <div class="card-body">
            <h5 class="card-title">Interview Conversations</h5>
            <select id="conversation-select" class="form-select mb-3" onchange="InterviewApp.loadConversation()">
                <option value="">Select an interview…</option>
            </select>
            <div id="conversation-viewer" style="display:none">
                <div id="conversation-content" class="border rounded p-3 bg-white"
                     style="max-height:500px;overflow-y:auto;white-space:pre-wrap;font-size:0.9rem;line-height:1.6">
                </div>
            </div>
        </div>
    </div>

    <!-- Previous sessions -->
    <div class="card shadow-sm mb-5">
        <div class="card-body">
            <h5 class="card-title">Previous Sessions</h5>
            <div id="history-list"><span class="text-muted">Loading…</span></div>
        </div>
    </div>
</div>

<!-- JS for actions -->
<script>
const InterviewApp = (() => {
    'use strict';

    const ApiClient = {
       
        getCookie(name) {
            const v = `; ${document.cookie}`;
            const parts = v.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
        },

        request(url, opts = {}) {
            return fetch(url, {
                ...opts,
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': this.getCookie('csrftoken'),
                    ...(opts.headers || {}),
                },
            }).then(r => r.json());
        },

        createSession(companyDescription) {
            return this.request('/api/sessions/', {
                method: 'POST',
                body: JSON.stringify({ company_description: companyDescription }),
            });
        },

        startSession(sessionId) {
            return this.request(`/api/sessions/${sessionId}/start/`, { method: 'POST' });
        },

        getProgress(sessionId) {
            return this.request(`/api/sessions/${sessionId}/progress/`);
        },

        getAnalysis(sessionId) {
            return this.request(`/api/sessions/${sessionId}/analysis/`);
        },

        listSessions() {
            return this.request('/api/sessions/');
        },

        listConversations(sessionId) {
            return this.request(`/api/sessions/${sessionId}/conversations/`);
        },

        getConversation(sessionId, conversationId) {
            return this.request(`/api/sessions/${sessionId}/conversations/${conversationId}/`);
        },
    };


    const State = {
        currentSessionId: null,
        pollTimer: null,
    };


    const UIHelpers = {
        el(id) {
            return document.getElementById(id);
        },

        show(id) {
            this.el(id).style.display = 'block';
        },

        hide(id) {
            this.el(id).style.display = 'none';
        },

        //  Update the progress bar width and label.
        setProgress(pct) {
            const bar = this.el('progress-bar');
            bar.style.width = pct + '%';
            bar.textContent = pct + ' %';
        },

        // Update the progress status text below the bar
        setProgressText(text) {
            this.el('progress-text').textContent = text;
        },

        renderRoles(roles) {
            if (!roles || roles.length === 0) return;
            this.show('roles-section');
            this.el('roles-list').innerHTML = roles
                .map(r => `<span class="badge bg-secondary">${r}</span>`)
                .join('');
        },

        renderThemes(themes) {
            const html = themes.slice(0, 3).map((t, i) => `
                <div class="card mb-3 border-start border-4 border-primary">
                    <div class="card-body">
                        <h6>#${i + 1}: ${t.theme_name}
                            <span class="badge bg-primary ms-1">${t.action_count} mentions</span>
                        </h6>
                        <p class="mb-1">${t.summary}</p>
                        ${(t.key_quotes && t.key_quotes.length)
                            ? `<small class="text-uppercase text-muted fw-semibold d-block mt-2 mb-1">Key quotes from employees</small>`
                            : ''}
                        ${(t.key_quotes || []).map(q =>
                            `<small class="text-muted fst-italic d-block">"${q}"</small>`
                        ).join('')}
                    </div>
                </div>`).join('');
            this.el('themes-container').innerHTML = html;
        },
    };

    // Progress poller
    const ProgressPoller = {
        // Steps for post-interview analysis
        ANALYSIS_STEPS: {
            'extracting':  'Extracting employee feedbacks from interviews…',
            'clustering':  'Finding most important themes across interviews…',
            'summarizing': 'Summarizing themes for board deck presentation…',
        },

        /** Polling interval in milliseconds */
        POLL_INTERVAL_MS: 2000,

        start(sessionId) {
            State.pollTimer = setInterval(
                () => this.poll(sessionId),
                this.POLL_INTERVAL_MS
            );
        },

        stop() {
            clearInterval(State.pollTimer);
            State.pollTimer = null;
        },

        async poll(sid) {
            const d = await ApiClient.getProgress(sid);
            const pct = d.total > 0 ? Math.round((d.completed / d.total) * 100) : 0;

            // If we're in an analysis phase, lock bar at 100%
            if (this.ANALYSIS_STEPS[d.status]) {
                UIHelpers.setProgress(100);
                UIHelpers.setProgressText(this.ANALYSIS_STEPS[d.status]);
            } else {
                UIHelpers.setProgress(pct);
                UIHelpers.setProgressText(`${d.completed} / ${d.total} interviews completed`);
            }

            // Show role badges once available (populated after generate_roles())
            UIHelpers.renderRoles(d.roles);

            // Terminal states
            if (d.status === 'completed') {
                this.stop();
                await SessionManager.showResults(sid);
            } else if (d.status === 'failed') {
                this.stop();
                UIHelpers.setProgressText('Something went wrong. Please try again.');
            }
        },
    };

    // Session manager
    const SessionManager = {
        async startInterviews() {
            const desc = UIHelpers.el('company-desc').value.trim();
            if (!desc) return alert('Please describe the company first.');

            // Disable button to prevent duplicate submissions
            UIHelpers.el('start-btn').disabled = true;

            // Step 1: Create session record in database
            const session = await ApiClient.createSession(desc);
            State.currentSessionId = session.id;

            // Step 2: Trigger background interview thread on the server
            await ApiClient.startSession(session.id);

            // Step 3: Switch UI from setup → progress
            UIHelpers.hide('setup-section');
            UIHelpers.show('progress-section');

            // Step 4: Begin polling for progress updates
            ProgressPoller.start(session.id);
        },

        async showResults(sid) {
            // Fetch analysis themes from GET /api/sessions/:id/analysis/
            const data = await ApiClient.getAnalysis(sid);

            // Transition UI: hide progress, show results
            UIHelpers.hide('progress-section');
            UIHelpers.show('results-section');

            // Render theme cards and set download link for PPTX board deck
            UIHelpers.renderThemes(data.themes);
            UIHelpers.el('deck-btn').href = `/api/sessions/${sid}/board-deck/`;

            // Load conversation dropdown and refresh history sidebar
            await ConversationManager.loadList(sid);
            HistoryManager.load();
        },

        resetUI() {
            UIHelpers.show('setup-section');
            UIHelpers.hide('results-section');
            UIHelpers.hide('conversations-section');
            UIHelpers.el('start-btn').disabled = false;
            UIHelpers.el('company-desc').value = '';
        },
    };

    // Conversation manager
    const ConversationManager = {
        async loadList(sid) {
            const convs = await ApiClient.listConversations(sid);
            const select = UIHelpers.el('conversation-select');

            // Reset dropdown to default option
            select.innerHTML = '<option value="">Select an interview…</option>';

            // Add one option per conversation (interview)
            convs.forEach(c => {
                const opt = document.createElement('option');
                opt.value = `${sid}:${c.id}`;
                opt.textContent = `Interview ${c.interview_number} – ${c.employee_role}`;
                select.appendChild(opt);
            });

            UIHelpers.show('conversations-section');
            UIHelpers.hide('conversation-viewer');
        },

        // Fetch and display the selected conversation transcript.
        async loadConversation() {
            const select = UIHelpers.el('conversation-select');
            const val = select.value;

            if (!val) {
                UIHelpers.hide('conversation-viewer');
                return;
            }

            // Parse composite value "sessionId:conversationId"
            const [sid, cid] = val.split(':');
            const data = await ApiClient.getConversation(sid, cid);

            // Simple markdown-to-HTML: convert **text** → <strong>text</strong>
            const rendered = data.markdown
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n\n/g, '<br><br>');

            UIHelpers.el('conversation-content').innerHTML = rendered;
            UIHelpers.show('conversation-viewer');
        },
    };


    // History manager
    const HistoryManager = {
        /**
         * Load and render the list of completed sessions.
         */
        async load() {
            const sessions = await ApiClient.listSessions();
            const completed = sessions.filter(s => s.status === 'completed');
            const el = UIHelpers.el('history-list');

            if (!completed.length) {
                el.innerHTML = '<span class="text-muted">No completed sessions yet.</span>';
                return;
            }

            el.innerHTML = completed.map(s => `
                <div class="d-flex justify-content-between align-items-center border-bottom py-2">
                    <div>
                        <strong>${s.company_description.substring(0, 80)}${s.company_description.length > 80 ? '…' : ''}</strong><br>
                        <small class="text-muted">${new Date(s.created_at).toLocaleString()} · ${s.num_interviews} interviews</small>
                    </div>
                    <div class="flex-shrink-0 text-nowrap">
                        <button class="btn btn-sm btn-outline-primary me-1"
                                onclick="InterviewApp.showResults(${s.id})">View</button>
                        <a class="btn btn-sm btn-outline-success"
                           href="/api/sessions/${s.id}/board-deck/">PPTX</a>
                    </div>
                </div>`).join('');
        },
    };

    // Initializer
    const Initializer = {
        async init() {
            // Always load history on page open
            HistoryManager.load();

            const sessions = await ApiClient.listSessions();

            // Resume polling if there's an active session (running or in analysis)
            const activeStatuses = ['running', 'extracting', 'clustering', 'summarizing'];
            const active = sessions.find(s => activeStatuses.includes(s.status));

            if (active) {
                State.currentSessionId = active.id;
                UIHelpers.hide('setup-section');
                UIHelpers.show('progress-section');
                ProgressPoller.start(active.id);
                ProgressPoller.poll(active.id); // Immediate first poll 
            }

            // If latest session failed and nothing is active, ensure setup is visible
            const latest = sessions[0];
            if (latest && latest.status === 'failed' && !active) {
                UIHelpers.show('setup-section');
                UIHelpers.hide('progress-section');
            }
        },
    };

    // Bootstrap the application on page load
    Initializer.init();

    return {
        startInterviews: () => SessionManager.startInterviews(),
        showResults:     (sid) => SessionManager.showResults(sid),
        resetUI:         () => SessionManager.resetUI(),
        loadConversation:() => ConversationManager.loadConversation(),
    };

})();
</script>
</body>
</html>
